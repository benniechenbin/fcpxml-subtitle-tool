                                <select id="secSub" class="pro-input w-full h-7 px-1 text-xs bg-gray-800 border-none">
                                    <option value="source">Original Text</option>
                                    <option value="target1">Target Lang 1</option>
                                    <option value="target2" selected>Target Lang 2</option>
                                    <option value="none">None (Hidden)</option>
                                </select>
                            </div>
                        </div>
                    
                        <button onclick="processWithAI()" id="btnAI" class="w-full bg-white text-black h-9 rounded text-xs font-bold hover:bg-gray-200 transition-colors flex items-center justify-center gap-2">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            Start Processing
                        </button>
                    </div>
                
                    <!-- AI Processing Progress Bar -->
                    <div id="progressBar" class="w-full h-0.5 bg-gray-800 rounded-full hidden overflow-hidden mt-2">
                        <div id="progressFill" class="h-full bg-primary-500 w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <!-- ===== Right: Console Output ===== -->
            <div class="md:col-span-4 flex flex-col h-full min-h-[400px]">
                <div class="pro-panel rounded-lg flex-1 flex flex-col overflow-hidden">
                    <div class="bg-gray-850 border-b border-gray-800 p-2 flex justify-between items-center">
                        <span class="text-[10px] font-semibold text-gray-500">CONSOLE OUTPUT</span>
                        <button onclick="document.getElementById('consoleLog').innerHTML=''" class="text-[10px] text-gray-600 hover:text-gray-400">Clear</button>
                    </div>
                    <div id="consoleLog" class="flex-1 p-3 overflow-y-auto font-mono text-[11px] text-gray-400 bg-gray-900/30">
                        <div>System ready...</div>
                    </div>
                </div>
            </div>

        </div>

        <!-- ========== Export Controls (FCPXML / SRT / VTT) ========== -->
        <div class="w-full mt-2">
            <div class="relative w-full">
                <div class="flex shadow-lg shadow-blue-900/20 rounded-lg overflow-hidden w-full">
                    <button onclick="exportFCPXML()" class="flex-1 bg-primary-600 hover:bg-primary-500 text-white font-medium py-3.5 transition-all flex justify-center items-center gap-2 text-sm border-r border-primary-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Export FCPXML
                    </button>
                    <button onclick="toggleDropdown(event)" class="bg-primary-600 hover:bg-primary-500 text-white px-6 transition-all flex items-center">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                </div>

                <div id="exportDropdown" class="hidden absolute left-0 top-full mb-2 w-full bg-gray-900 border border-gray-800 rounded-lg shadow-2xl z-50 overflow-hidden">
                    <button onclick="exportSRT(); closeDropdown()" class="w-full text-left px-4 py-4 text-xs text-gray-400 hover:bg-gray-800 hover:text-white transition-colors border-b border-gray-800 flex items-center justify-between">
                        <span>EXPORT SRT</span><span class="text-[10px] text-gray-600 font-mono">通用文本</span>
                    </button>
                    <button onclick="exportVTT(); closeDropdown()" class="w-full text-left px-4 py-4 text-xs text-gray-400 hover:bg-gray-800 hover:text-white transition-colors flex items-center justify-between">
                        <span>EXPORT VTT</span><span class="text-[10px] text-gray-600 font-mono">网页视频</span>
                    </button>
                </div>
            </div>
        </div>

    </div>
    <script src="main.js"></script>
</body>
</html>
